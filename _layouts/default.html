<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="{{ page.description | default: site.description }}">
    <title>{% if page.title and page.title != "Home" %}{{ page.title }} · {% endif %}{{ site.title }}</title>
    <link rel="icon" type="image/svg+xml" href="{{ '/favicon.svg' | relative_url }}">
    <link rel="preconnect" href="https://github.com">
    <link rel="stylesheet" href="{{ '/style.css' | relative_url }}">
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="{{ '/' | relative_url }}">JingWen Fan</a>
      <nav class="nav" aria-label="Primary navigation">
        <a href="{{ '/' | relative_url }}#projects">项目</a>
        <a href="{{ '/' | relative_url }}#writing">文章</a>
        <a href="https://github.com/study8677">GitHub</a>
        <a href="mailto:867762462f@gmail.com">联系</a>
      </nav>
    </header>

    <div class="shell">
      {{ content }}
    </div>

    <footer class="footer">
      <p>© {{ "now" | date: "%Y" }} JingWen Fan. Built with GitHub Pages and Jekyll.</p>
    </footer>
  </body>
</html>
