---
layout: default
---

<article class="post">
  <header class="post-header">
    <a class="back-link" href="{{ '/articles/' | relative_url }}">文章列表</a>
    <h1>{{ page.title }}</h1>
    <p class="post-meta">
      <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%Y-%m-%d" }}</time>
      {% if page.tags %}
        <span>{{ page.tags | join: " / " }}</span>
      {% endif %}
    </p>
    {% if page.summary %}
      <p class="post-summary">{{ page.summary }}</p>
    {% endif %}
  </header>

  <div class="post-body">
    {{ content }}
  </div>
</article>
